    <script src="public/js/script.js"></script>
    <script>
        let loader = document.getElementById("loader");
        document.addEventListener("DOMContentLoaded", () => {
            setTimeout(() => {
                loader.style.display = "none";
            }, 1000);
        });

        document.getElementById("disqus-button").addEventListener("click", () => {
            const overlay = document.getElementById("disqus-overlay");
            const disqusContainer = document.getElementById("disqus_thread");

            // Tampilkan overlay
            overlay.classList.add("active");

            // Periksa apakah Disqus sudah dimuat
            if (!disqusContainer.hasChildNodes()) {
                var d = document, s = d.createElement('script');
                s.src = 'https://YOUR_DISQUS_SHORTNAME.disqus.com/embed.js'; // Ganti YOUR_DISQUS_SHORTNAME dengan shortname Disqus Anda
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
            }
        });

        // Tutup overlay saat mengklik di luar kontainer
        document.getElementById("disqus-overlay").addEventListener("click", (event) => {
            const overlay = document.getElementById("disqus-overlay");
            const container = document.getElementById("disqus-container");

            // Tutup hanya jika klik terjadi di luar kontainer
            if (!container.contains(event.target)) {
                overlay.classList.remove("active");
            }
        });

        document.getElementById("show-search").addEventListener("click", () => {
            const search = document.getElementById("search");

            if (search.classList.contains("hidden")) {
                search.classList.remove("hidden");
            } else {
                search.classList.add("hidden");
            }
        })
    </script>
