    <script type="module" src="https://cdn.jsdelivr.net/npm/ldrs/dist/auto/ring.js"></script>
    <script>
        const apiURL = "https://asepharyana.cloud/api/anime";
        const urlParams = new URLSearchParams(window.location.search);
        const slug = urlParams.get('episode');
        fetch(`${apiURL}/full/${slug}`, {
            headers: { accept: "application/json" },
        })
            .then((res) => {
                return res.json();
            })
            .then((data) => {
                console.log(data);
                let episode = data.data.episode;
                let episode_number = data.data.episode_number;
                let has_next_episode = data.data.has_next_episode;
                let has_previous_episode = data.data.has_previous_episode;
                let stream_url = data.data.stream_url;
                let container = document.getElementById("container");
                container.innerHTML = `
                <div class="flex flex-col justify-center gap-4 p-4">
                    <h2 class="text-lg font-semibold">${episode}</h2>
                    <div class="w-full h-0 pb-[56.25%] relative">
    <!-- Gambar Poster -->
    <iframe src="${stream_url}" frameborder="0" allowfullscreen class="absolute top-0 left-0 w-full h-full"></iframe>
</div>
    <!-- Informasi Lebih Lanjut -->
    <div class="flex flex-col gap-4">
        <div id="pagination" class="flex justify-between">
    <button id="previous" class="py-2 px-4 bg-gray-200 hover:bg-violet-700 hover:text-white rounded-lg transition-all duration-300 disabled:opacity-50 disabled:cursor-not-allowed">Previous</button>
    <button id="next" class="py-2 px-4 bg-gray-200 hover:bg-violet-700 hover:text-white rounded-lg transition-all duration-300 disabled:opacity-50 disabled:cursor-not-allowed">Next</button>
</div>

        <div id="download">
            <h2 class="text-lg font-bold">Download's</h2>
        </div>
    </div>
</div>`

                // Ambil elemen tombol
                const previousButton = document.getElementById('previous');
                const nextButton = document.getElementById('next');

                // Menampilkan tombol Previous jika ada episode sebelumnya
                if (has_previous_episode) {
                    previousButton.disabled = false; // Mengaktifkan tombol Previous
                    previousButton.onclick = function () {
                        window.location.href = `index.html?episode=${data.data.previous_episode.slug.replace(/\/$/, "")}`; // Arahkan ke URL previous episode
                    };
                } else {
                    previousButton.disabled = true; // Menonaktifkan tombol Previous
                }

                // Menampilkan tombol Next jika ada episode berikutnya
                if (has_next_episode) {
                    nextButton.disabled = false; // Mengaktifkan tombol Next
                    nextButton.onclick = function () {
                        window.location.href = `index.html?episode=${data.data.next_episode.slug.replace(/\/$/, "")}`; // Arahkan ke URL next episode
                    };
                } else {
                    nextButton.disabled = true; // Menonaktifkan tombol Next
                }

                // Ambil elemen tempat kita akan menampilkan server
                const downloadContainer = document.getElementById('download');

                // Data download_urls
                let downloadUrls = data.data.download_urls;

                // Loop melalui setiap resolusi (360, 480, 720, dll.)
                Object.keys(downloadUrls).forEach(resolution => {
                    // Buat elemen untuk setiap resolusi
                    const resolutionElement = document.createElement('div');
                    resolutionElement.classList.add('mb-6');  // Menambahkan margin bawah untuk pemisah antar resolusi

                    // Judul Resolusi
                    const resolutionTitle = document.createElement('h3');
                    resolutionTitle.classList.add('text-base', 'font-semibold', 'mb-4'); // Tambahkan gaya teks
                    resolutionTitle.textContent = `Resolution: ${resolution}`;

                    // Tambahkan judul resolusi ke dalam div resolusi
                    resolutionElement.appendChild(resolutionTitle);

                    // Buat div pembungkus untuk setiap server
                    const serverWrapper = document.createElement('div');
                    serverWrapper.classList.add('mb-2', 'flex', 'gap-4', 'flex-wrap'); // Menambahkan margin dan menyusun secara horizontal
                    // Loop melalui setiap server di resolusi tersebut
                    downloadUrls[resolution].forEach((entry, index) => {

                        // Buat elemen untuk setiap server
                        const serverElement = document.createElement('a');
                        serverElement.href = `${entry.url}`;
                        serverElement.classList.add(
                            "py-2",
                            "px-4",
                            "bg-gray-200",
                            "hover:bg-violet-700",
                            "hover:text-white",
                            "rounded-lg",
                            "transition-all",
                            "duration-300",
                            "w-auto", // Mengatur lebar otomatis agar tidak memenuhi lebar layar
                            "max-w-xs", // Membatasi lebar maksimum
                            "text-center", // Memusatkan teks dalam link
                            "text-sm"
                        );
                        serverElement.textContent = `${entry.server}`;

                        // Tambahkan elemen server ke dalam div pembungkus
                        serverWrapper.appendChild(serverElement);

                        // Tambahkan div pembungkus ke dalam resolusi
                        resolutionElement.appendChild(serverWrapper);
                    });

                    // Tambahkan bagian resolusi ke dalam container utama
                    downloadContainer.appendChild(resolutionElement);
                });
            });
    </script>
