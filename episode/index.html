<body class="">
    <div id="loader"

    <header id="header" class="fixed top-0 z-10 w-full h-16 bg-[#F0F0F5]">
        <div class="full h-full mx-auto px-5">
            <div class="relative flex justify-between items-center h-full w-full">

                        class="flex items-center gap-1 text-l-on-base dark:text-d-on-base transition-colors duration-300 ease-in-out text-xl">

                    </a>
                </div>
            </div>
        </div>
    </header>
    <header id="bottom-header" class="fixed bottom-0 w-full h-16 z-10 bg-white">
        <div class="full h-full mx-auto px-5">
            <div class="relative flex items-center h-full w-full">
                <div class="">
                    <nav
                        class="flex items-center justify-center text-sm gap-4 font-semibold text-l-on-base dark:text-d-on-base">

                            class="flex gap-2 rounded-full items-center justify-center transition-colors duration-300 ease-in-out text-violet-700 bg-[#F0F0F5] py-2 px-4">

                        <a href="/arnime/comic"
                            class="flex gap-2 rounded-full items-center justify-center transition-colors duration-300 ease-in-out">

    <main class="py-16">
        <section class="px-5">
            <div class="flex flex-col gap-4 min-h-screen overflow-hidden py-5" id="container">
            </div>
        </section>
        <section class="text-center px-5 pt-14 pb-7 animate">
            <p class="text-xs">
                <a href="https://creativecommons.org/licenses/by-nc-sa/4.0/" class="underline">CC BY-NC-SA 4.0</a>
                2024-PRESENT &copy; Ammar |

                |

            </p>

            <p class="text-xs">
                Produdly created by
                <a href="https://ammaricano.my.id" class="underline">ammaricano</a>
                and Powered by
                <a href="tailwindcss.com" class="underline">TailwindCSS</a>
            </p>
        </section>
    </main>
    <script type="module" src="https://cdn.jsdelivr.net/npm/ldrs/dist/auto/ring.js"></script>
    <script>
        let loader = document.getElementById("loader");
        document.addEventListener("DOMContentLoaded", () => {
            setTimeout(() => {
                loader.style.display = "none";
            }, 1000);
        });

        const apiURL = "https://otakudesu.natee.me/api/anime";
        const urlParams = new URLSearchParams(window.location.search);
        const slug = urlParams.get('slug');
        const episodes = urlParams.get('episodes');
        fetch(`${apiURL}/${slug}/episodes/${episodes}`, {
            headers: { accept: "application/json" },
        })
            .then((res) => {
                return res.json();
            })
            .then((data) => {
                console.log(data);
                let episode = data.data.episode;
                let episode_number = data.data.episode_number;
                let has_next_episode = data.data.has_next_episode;
                let has_previous_episode = data.data.has_previous_episode;
                let stream_url = data.data.stream_url;
                let container = document.getElementById("container");
                container.innerHTML = `
                <div class="flex flex-col justify-center gap-4">
                    <h2 class="text-lg font-semibold">${episode}</h2>
                    <div class="w-full h-0 pb-[56.25%] relative">
    <!-- Gambar Poster -->
    <iframe src="${stream_url}" frameborder="0" allowfullscreen class="absolute top-0 left-0 w-full h-full"></iframe>
</div>

<select name="resolution" id="resolution" class="outline-0">
                </select>
    <!-- Informasi Lebih Lanjut -->
    <div class="flex flex-col gap-4">
        <div id="pagination" class="flex justify-between">
    <button id="previous" class="py-2 px-4 bg-gray-200 hover:bg-violet-700 hover:text-white rounded-lg transition-all duration-300 disabled:opacity-50 disabled:cursor-not-allowed">Previous</button>
    <button id="next" class="py-2 px-4 bg-gray-200 hover:bg-violet-700 hover:text-white rounded-lg transition-all duration-300 disabled:opacity-50 disabled:cursor-not-allowed">Next</button>
</div>

        <div id="download">
            <h2 class="text-lg font-bold">Download</h2>
        </div>
    </div>
</div>`

                // Ambil elemen tombol
                const previousButton = document.getElementById('previous');
                const nextButton = document.getElementById('next');

                // Menampilkan tombol Previous jika ada episode sebelumnya
                let slug = data.data.anime.slug.replace(/\//g, "");
                if (has_previous_episode) {
                    previousButton.disabled = false; // Mengaktifkan tombol Previous
                    previousButton.onclick = function () {
                        window.location.href = `index.html?slug=${slug}&episodes=${parseInt(episodes - 1)}`; // Arahkan ke URL Previous episode
                    };
                } else {
                    previousButton.disabled = true; // Menonaktifkan tombol Previous
                }

                // Menampilkan tombol Next jika ada episode berikutnya
                if (has_next_episode) {
                    nextButton.disabled = false; // Mengaktifkan tombol Next
                    nextButton.onclick = function () {
                        window.location.href = `index.html?slug=${slug}&episodes=${parseFloat(episodes) + 1}`; // Arahkan ke URL next episode
                    };
                } else {
                    nextButton.disabled = true; // Menonaktifkan tombol Next
                }

                /// Ambil elemen tempat kita akan menampilkan server
                const downloadContainer = document.getElementById('download');
                const resolutionSelect = document.getElementById('resolution'); // Ambil elemen <select> untuk resolusi

                // Data download_urls
                let downloadUrls = data.data.download_urls;
                const defaultOption = document.createElement("option");
                defaultOption.value = stream_url;
                defaultOption.textContent = "Default Stream";
                resolutionSelect.appendChild(defaultOption);
                // Loop melalui setiap resolusi (360, 480, 720, dll.)
                Object.keys(downloadUrls).forEach(format => {
                    downloadUrls[format].forEach(resolution => {
                        // Create the div for each resolution
                        const resolutionElement = document.createElement('div');
                        resolutionElement.classList.add('mb-6'); // Margin bottom for separation

                        // Resolution title
                        const resolutionTitle = document.createElement('h3');
                        resolutionTitle.classList.add('text-base', 'font-semibold', 'mb-4');
                        resolutionTitle.textContent = `Resolution: ${resolution.resolution}`;

                        // Append the title to the resolution element
                        resolutionElement.appendChild(resolutionTitle);

                        // Create a wrapper for servers
                        const serverWrapper = document.createElement('div');
                        serverWrapper.classList.add('mb-2', 'flex', 'gap-4', 'flex-wrap');

                        // Loop through each server for the resolution
                        resolution.urls.forEach(entry => {
                            const serverElement = document.createElement('a');
                            serverElement.href = entry.url;
                            serverElement.classList.add(
                                "py-2", "px-4", "bg-gray-200", "hover:bg-violet-700", "hover:text-white", "rounded-lg", "transition-all", "duration-300", "w-auto", "max-w-xs", "text-center", "text-sm"
                            );
                            serverElement.textContent = `${entry.provider}`;

                            // Jika provider adalah acefile, tambahkan ke <select> sebagai opsi
                            if (entry.provider.toLowerCase() == 'acefile ' || entry.provider.toLowerCase() == 'acefile') {
                                console.log(entry.provider.toLowerCase());

                                const option = document.createElement('option');
                                option.value = entry.url; // URL sebagai value
                                option.textContent = `${resolution.resolution} - ${entry.provider}`; // Teks opsi
                                resolutionSelect.appendChild(option); // Tambahkan opsi ke <select>
                            }

                            // Append server element to the wrapper
                            serverWrapper.appendChild(serverElement);
                        });

                        // Append server wrapper to resolution element
                        resolutionElement.appendChild(serverWrapper);

                        // Append resolution element to the main container
                        downloadContainer.appendChild(resolutionElement);
                    });
                });
                const iframe = document.querySelector("iframe");
                resolutionSelect.addEventListener("change", function (e) {
                    iframe.src = e.target.value;
                });
            });
    </script>
</body>
