    <script>
        fetch("https://wajik-anime-api.vercel.app/otakudesu/schedule")
            .then((res) => res.json())
            .then((data) => {
                console.log(data);
                let schedule = ''; // Declare the container outside the loop
                for (var i = 0; i < data.data.days.length; i++) {
                    let day = data.data.days[i].day;
                    let daySchedule = ''; // Container for the day's anime list
                    for (var j = 0; j < data.data.days[i].animeList.length; j++) {
                        let anime = data.data.days[i].animeList[j];
                        let title = anime.title;
                        let slug = anime.animeId; // Use the animeId as the slug
                        daySchedule += `
                            <a href="detailanime/index.html?anime=${slug}" class="hover:text-violet-700 border-b border-gray-200 pb-2">${title}</a>
                        `;
                    }
                    schedule += `
                        <div class="bg-white rounded-lg border border-gray-200 p-4 flex flex-col gap-2">
                            <div class="bg-violet-100 rounded-lg p-4 mb-4">
                                <h2 class="text-center text-violet-700 font-semibold text-gray-800">${day}</h2>
                            </div>
                            ${daySchedule} <!-- Display the anime list for this day -->
                        </div>
                    `;
                }
                document.getElementById('container').innerHTML += schedule; // Add all the schedule cards to the container
            })
            .catch((error) => {
                console.error("Error fetching schedule:", error);
            });
    </script>
    <script>
        let loader = document.getElementById("loader");
        document.addEventListener("DOMContentLoaded", () => {
            setTimeout(() => {
                loader.style.display = "none";
