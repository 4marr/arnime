<body class="">
    <header id="header" class="fixed top-0 w-full h-16 z-50 bg-white shadow">
        <div class="full h-full mx-auto px-10">
            <div class="relative flex justify-center md:justify-between items-center h-full w-full">
                <div class="gap-1 font-bold text-sm">
                    <a href="/" class="flex items-center gap-1 transition-colors duration-300 ease-in-out text-xl">
                        <h2 class="text-lg flex">AR<span class="text-violet-700">NIME</span></h2>
                    </a>
                </div>
            </div>
        </div>
    </header>
    <main class="pt-14">
        <section class="px-5">
            <div class="flex flex-col gap-4 min-h-screen overflow-y-hidden overflow-x-auto py-5" id="container">
            </div>
        </section>
        <section class="text-center px-5 py-7 animate">
            <p class="text-xs">
                <a href="https://creativecommons.org/licenses/by-nc-sa/4.0/" class="underline">CC BY-NC-SA 4.0</a>
                2024-PRESENT &copy; Ammar |
                <a href="#" class="underline">Privacy Police</a>
                |
                <a href="#" class="underline">Disclaimer</a>
                |
                <a href="https://status.ammaricano.my.id" class="underline">Status</a>
            </p>
            <p class="text-xs">
                Produdly created by
                <a href="https://ammaricano.my.id" class="underline">ammaricano</a>
                and Powered by
                <a href="tailwindcss.com" class="underline">TailwindCSS</a>
            </p>
        </section>
    </main>
    <script type="module" src="https://cdn.jsdelivr.net/npm/ldrs/dist/auto/ring.js"></script>
    <script>
        const apiURL = "https://asepharyana.cloud/api/anime";
        const urlParams = new URLSearchParams(window.location.search);
        const slug = urlParams.get('anime');
        fetch(`${apiURL}/search?q=${slug}`, {
            headers: { accept: "application/json" },
        })
            .then((res) => {
                return res.json();
            })
            .then((data) => {
                console.log(data);
                if (data.data.length) {
                    let container = "";
                    for (var i = 0; i < data.data.length; i++) {
                        let title = data.data[i].title;
                        let slug = data.data[i].slug;
                        let poster = data.data[i].poster;
                        let episode = data.data[i].episode;
                        let status = data.data[i].status;
                        let rating = data.data[i].rating;
                        let genres = data.data[i].genres.map(genre => genre).join(", ");

                        container += `
            <a href="../detailanime/index.html?anime=${slug}" class="w-full rounded flex gap-4 hover:bg-gray-100 transition-all duration-300">
                <div class="relative min-w-28 overflow-hidden rounded">
                    <p class="absolute bg-violet-700 text-white text-xs p-1 rounded-br-lg">${status}</p>
                    <p class="absolute bg-violet-700 text-white text-xs p-1 rounded-tl-lg bottom-0 right-0">⭐ ${rating}</p>
                    <img src="${poster}" alt="thumbnail" class="h-40 w-full object-cover"/>
                </div>
                <div>
                <p class="line-clamp-3 text-lg font-semibold">${title}</p>
                <p class="line-clamp-2 text-sm">${episode}</p>
                <p class="line-clamp-2 text-sm">${genres}</p>
                </div>
            </a>
            `;
                    }
                    document.getElementById('container').innerHTML = container;
                } else {
                    document.getElementById('container').innerHTML = `<p class="text-center flex items-center justify-center">Anime yang kamu cari tidak ditemukan </p>`;
                }
            })
    </script>
</body>

</html>
