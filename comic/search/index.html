    <script type="module" src="https://cdn.jsdelivr.net/npm/ldrs/dist/auto/ring.js"></script>
    <script>
        const apiURL = "https://asepharyana.cloud/api/komik";
        const urlParams = new URLSearchParams(window.location.search);
        const slug = urlParams.get('comic');
        fetch(`${apiURL}/search?query=${slug}`, {
            headers: { accept: "application/json" },
        })
            .then((res) => {
                return res.json();
            })
            .then((data) => {
                console.log(data);
                if (data.data.length) {
                    let container = "";
                    for (var i = 0; i < data.data.length; i++) {
                        let title = data.data[i].title;
                        let image = data.data[i].image;
                        let type = data.data[i].type;
                        let komik_id = data.data[i].komik_id;

                        container += `
            <a href="../detailcomic/index.html?comic=${komik_id}" class="w-full rounded flex gap-4 hover:bg-gray-100 transition-all duration-300">
                <div class="relative w-28 overflow-hidden rounded">
                    <p class="absolute bg-violet-700 text-white text-xs p-1 rounded-br-lg">${type}</p>
                    <img src="${image}" alt="${image}" class="h-40 w-full object-cover"/>
                </div>
                <div>
                <p class="line-clamp-3 text-lg font-semibold">${title}</p>
                </div>
            </a>
            `;
                    }
                    document.getElementById('container').innerHTML = container;
                } else {
                    document.getElementById('container').innerHTML = `<p class="text-center flex items-center justify-center">Anime yang kamu cari tidak ditemukan </p>`;
                }
            })
    </script>
